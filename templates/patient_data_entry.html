<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Data Entry Simulation</title>
    <link rel="stylesheet" href="./static/css/tailwind.css">
    </head>
<body class="bg-gray-200 min-h-screen flex items-center justify-center font-sans">
    
    <div class="w-full max-w-md p-8 bg-white rounded-xl shadow-2xl border-t-8 border-blue-600">
        
        <h1 class="text-3xl font-extrabold text-gray-800 mb-6 border-b pb-3 text-center">
            📶 Remote Data Transmission
        </h1>
        
        {% if request.args.get('success') %}
            <div class="p-3 mb-4 text-sm text-green-800 rounded-lg bg-green-100 border border-green-300" role="alert">
                <span class="font-medium">✅ Success!</span> Data transmitted and saved successfully.
            </div>
        {% endif %}

        <form method="POST" action="{{ url_for('patient_data_entry') }}" class="space-y-4">
            
            <div>
                <label for="patient_id" class="block text-sm font-medium text-gray-700 mb-1">Patient ID (e.g., 101):</label>
                <input type="number" id="patient_id" name="patient_id" required
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-base">
            </div>

            <div>
                <label for="heart_rate" class="block text-sm font-medium text-gray-700 mb-1">Heart Rate (BPM):</label>
                <input type="number" id="heart_rate" name="heart_rate" required
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-base">
            </div>

            <div>
                <label for="blood_pressure" class="block text-sm font-medium text-gray-700 mb-1">Blood Pressure (SYS/DIA):</label>
                <input type="text" id="blood_pressure" name="blood_pressure" value="120/80" required
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-base">
            </div>

            <div>
                <label for="glucose_level" class="block text-sm font-medium text-gray-700 mb-1">Glucose Level (mg/dL):</label>
                <input type="number" step="0.1" id="glucose_level" name="glucose_level" required
                       class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 text-base">
            </div>

            <div class="flex items-start">
                <div class="flex items-center h-5">
                    <input type="checkbox" id="lifeline" name="lifeline"
                           class="focus:ring-red-500 h-4 w-4 text-red-600 border-gray-300 rounded">
                </div>
                <label for="lifeline" class="ml-3 text-sm font-medium text-red-600">
                    🚨 <span class="font-bold">Lifeline Emergency Button Pressed</span> (High-Priority Alert)
                </label>
            </div>

            <button type="submit"
                    class="w-full mt-6 flex justify-center py-3 px-4 border border-transparent rounded-md shadow-sm text-lg font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition duration-300">
                Transmit Data to Hospital
            </button>
        </form>
        
        <p class="mt-6 text-center text-sm">
            <a href="{{ url_for('index') }}" class="font-medium text-blue-600 hover:text-blue-500">
                Back to Login
            </a>
        </p>
    </div>
</body>
</html>
