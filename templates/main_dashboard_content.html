<!DOCTYPE html>
<html>
<head>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 p-6">
    <h1 class="text-2xl font-bold mb-4">Dashboard Overview</h1>
    
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div class="bg-white p-4 rounded shadow">
            <h2 class="text-xl font-semibold mb-2 text-red-600">Unresolved Alerts</h2>
            <ul>
                {% for alert in alerts %}
                <li class="border-b py-2">{{ alert.name }}: {{ alert.message }}</li>
                {% else %}
                <li class="py-2 text-gray-500">No active alerts.</li>
                {% endfor %}
            </ul>
        </div>

        <div class="bg-white p-4 rounded shadow">
            <h2 class="text-xl font-semibold mb-2 text-indigo-600">New Patients</h2>
            <ul>
                {% for patient in patients %}
                <li class="border-b py-2">{{ patient.name }} (ID: {{ patient.patient_id }})</li>
                {% endfor %}
            </ul>
        </div>
    </div>
</body>
</html>
