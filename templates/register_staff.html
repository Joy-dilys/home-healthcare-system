{% extends "layout.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-200">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Register New Staff/Doctor</h2>
        
        <form action="{{ url_for('register_staff') }}" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-600">Username</label>
                <input type="text" name="username" required 
                       class="w-full mt-1 p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-600">Password</label>
                <input type="password" name="password" required 
                       class="w-full mt-1 p-2.5 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-semibold text-gray-600">Role</label>
                <select name="role" class="w-full mt-1 p-2.5 border rounded-lg bg-white">
                    <option value="Staff">Doctor/Staff</option>
                    <option value="Admin">Administrator</option>
                </select>
            </div>
            
            <button type="submit" 
                    class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700 transition duration-200">
                Create Account
            </button>
        </form>
    </div>
</div>
{% endblock %}
