<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Portal Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    </head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center font-sans"> 
    
    <div class="w-full max-w-sm p-8 bg-white rounded-xl shadow-2xl patient-login-container"> 
        
        <h1 class="text-3xl font-bold text-blue-800 mb-1 text-center">Patient Portal</h1>
        <p class="text-gray-600 mb-6 text-center text-sm">Access your health data and monitoring trends.</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="p-3 mb-4 text-sm rounded-lg border border-l-4 font-medium 
                        {% if category == 'error' %}
                            bg-red-100 text-red-800 border-red-500
                        {% elif category == 'success' %}
                            bg-green-100 text-green-800 border-green-500
                        {% else %}
                            bg-blue-100 text-blue-800 border-blue-500
                        {% endif %}"
                    role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form action="{{ url_for('patient_login') }}" method="post" class="space-y-4">
            
            <div>
                <label for="patient_id" class="block text-sm font-semibold text-gray-700 mb-1">Patient ID</label>
                <input type="number" id="patient_id" name="patient_id" placeholder="Enter your Patient ID" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition duration-150">
            </div>
            
            <div>
                <label for="phone_number" class="block text-sm font-semibold text-gray-700 mb-1">Contact Phone Number</label>
                <input type="text" id="phone_number" name="phone_number" placeholder="e.g., 0792897610" required
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-blue-500 focus:border-blue-500 transition duration-150">
            </div>
            
            <button type="submit" 
                    class="w-full mt-4 py-3 bg-blue-600 text-white font-semibold rounded-lg shadow-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition duration-300">
                Log In to Dashboard
            </button>
        </form>

        <p class="mt-6 text-center text-sm">
            <a href="{{ url_for('index') }}" class="font-medium text-blue-600 hover:text-blue-800 transition duration-200">
                ← Return to Hospital Homepage
            </a>
        </p>
    </div>
</body>
</html>
