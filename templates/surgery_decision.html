<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Surgical Decision | HomeHealth</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-3xl mx-auto py-12 px-4">
        <div class="bg-white shadow-2xl rounded-2xl overflow-hidden border-t-8 border-rose-600">
            <div class="p-8">
                <div class="flex items-center space-x-3 mb-6">
                    <div class="p-3 bg-rose-100 rounded-full text-rose-600">
                        <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"/></svg>
                    </div>
                    <h2 class="text-2xl font-black text-gray-900 tracking-tight">Clinical Decision Module</h2>
                </div>

                <div class="bg-amber-50 border-l-4 border-amber-400 p-4 mb-8">
                    <p class="text-sm text-amber-700">
                        <strong>Patient:</strong> {{ patient.name }} | <strong>Status:</strong> Critical Review Required
                    </p>
                </div>

                <form action="{{ url_for('surgery_decision_page', patient_id=patient.patient_id) }}" method="POST" class="space-y-6">
                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Final Recommendation</label>
                        <select name="decision_type" required class="w-full bg-slate-50 border-gray-300 rounded-lg py-3 px-4 focus:ring-rose-500 focus:border-rose-500 border">
                            <option value="">-- Choose Path --</option>
                            <option value="emergency_surgery">🚨 Emergency Surgical Intervention</option>
                            <option value="scheduled_surgery">📅 Schedule Elective Surgery</option>
                            <option value="intensive_monitoring">🏠 Continue Remote Monitoring</option>
                            <option value="discharge">✅ Discharge from Monitoring</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-gray-700 mb-2">Decision Justification</label>
                        <textarea name="justification" rows="5" required placeholder="Provide clinical reasoning for this decision. This will be added to the permanent medical record." 
                            class="w-full bg-slate-50 border-gray-300 rounded-lg p-4 focus:ring-rose-500 focus:border-rose-500 border"></textarea>
                    </div>

                    <div class="pt-4">
                        <button type="submit" class="w-full py-4 bg-rose-600 text-white text-lg font-bold rounded-xl shadow-xl hover:bg-rose-700 transition-all transform hover:-translate-y-1">
                            Authorize & Execute Decision
                        </button>
                    </div>
                </form>
            </div>
            <div class="bg-slate-50 px-8 py-4 border-t">
                <a href="{{ url_for('manage_patients') }}" class="text-xs text-slate-400 hover:text-slate-600 underline">Return to patient list without saving</a>
            </div>
        </div>
    </div>
</body>
</html>
